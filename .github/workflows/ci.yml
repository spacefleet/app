name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# On PRs, new commits cancel older in-progress runs. On main, queue
# everything so each merged commit produces a pushed image.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ui/embed.go's //go:embed all:dist needs at least one file to match.
      # The repo commits ui/dist/.gitkeep to keep the tree buildable without
      # first running the UI build; create it defensively in case someone
      # forgets.
      - name: Seed embed directory
        run: mkdir -p ui/dist && touch ui/dist/.gitkeep

      - run: go vet ./...
      - run: go test ./...

  test-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  docker:
    needs: [test-go, test-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR requires a lowercase image path; normalise here in case the
      # org/repo uses mixed case.
      - name: Resolve image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      # QEMU is only needed for emulated RUN steps — our Dockerfile
      # cross-compiles via TARGETARCH and the runtime stage has no RUN,
      # so this is belt-and-braces for future changes.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      # Only log in when we're going to push; PR builds run unauthenticated.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # push=true only on main — PRs still build (catching Dockerfile
      # regressions before merge) but don't publish.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
