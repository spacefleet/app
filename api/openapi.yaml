openapi: 3.0.3
info:
  title: Spacefleet API
  version: 0.1.0
  description: |
    HTTP API for the Spacefleet app. Regenerate consumers whenever this file changes.
servers:
  - url: /
paths:
  /api/health:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/ping:
    get:
      summary: Echo a greeting
      operationId: getPing
      parameters:
        - in: query
          name: name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Greeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Greeting"
        default:
          $ref: "#/components/responses/Error"

  /api/cli/auth/approve:
    post:
      summary: Approve a pending CLI login (browser-initiated)
      description: |
        Called by the browser after the signed-in user confirms the CLI
        approval screen. Records a PKCE challenge and a human-friendly
        token name, returning a single-use exchange code that the browser
        redirects back to the CLI's localhost callback.
      operationId: approveCliAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliApproveRequest"
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliApproveResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/cli/auth/exchange:
    post:
      summary: Exchange an approval code for a CLI token (public)
      description: |
        Called server-to-server by the CLI. Trades a one-time code plus the
        PKCE verifier for a long-lived bearer token. This endpoint is public
        because the CLI has no session yet when it calls it.
      operationId: exchangeCliAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CliExchangeRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliExchangeResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/cli/tokens:
    get:
      summary: List the caller's CLI tokens
      operationId: listCliTokens
      responses:
        "200":
          description: Token metadata (no plaintext)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliTokenList"
        default:
          $ref: "#/components/responses/Error"

  /api/cli/tokens/{id}:
    delete:
      summary: Revoke a CLI token
      operationId: revokeCliToken
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Revoked (idempotent)
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/github/installations/start:
    post:
      summary: Begin a GitHub App install handshake
      description: |
        Issues a one-time CSRF state and returns the URL the browser should
        send the user to. After install, GitHub redirects back to the App's
        configured setup URL with `installation_id` and `state`; the SPA
        finishes the handshake via `/api/github/installations/complete`.
      operationId: startGithubInstall
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Install URL ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubInstallStart"
        default:
          $ref: "#/components/responses/Error"

  /api/github/installations/complete:
    post:
      summary: Finalize a GitHub App install handshake (Clerk session only)
      description: |
        Called by the SPA setup-callback page with the `state` and
        `installation_id` returned from GitHub. Verifies the state, fetches
        the installation from GitHub via App-level auth, and persists it
        scoped to the org that started the handshake. Not org-prefixed
        because the org is recovered from the state itself.
      operationId: completeGithubInstall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GithubInstallCompleteRequest"
      responses:
        "200":
          description: Installation persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubInstallCompleteResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/github/installations:
    get:
      summary: List GitHub App installations connected to this org
      operationId: listGithubInstallations
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Installations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubInstallationList"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/github/installations/{installationId}:
    delete:
      summary: Disconnect a GitHub App installation from this org
      description: |
        Drops Spacefleet's record of the installation. Does not uninstall
        the GitHub App on github.com — that's the user's choice.
      operationId: deleteGithubInstallation
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/InstallationID"
      responses:
        "204":
          description: Disconnected (idempotent)
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/github/installations/{installationId}/repositories:
    get:
      summary: List repositories accessible to a GitHub App installation
      description: |
        Mints a fresh installation access token and enumerates the repos
        the App has been granted on. This is what the build pipeline will
        clone from.
      operationId: listGithubInstallationRepositories
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/InstallationID"
      responses:
        "200":
          description: Repositories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubRepositoryList"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/aws/accounts:
    get:
      summary: List AWS cloud accounts connected to this org
      operationId: listAwsAccounts
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Cloud accounts (newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAccountList"
        default:
          $ref: "#/components/responses/Error"
    post:
      summary: Begin AWS cloud-account onboarding
      description: |
        Mints an external ID, persists a pending cloud_accounts row, and
        returns the CloudFormation Quick Create URL the customer should
        open to launch the integration role. The external ID is shown
        exactly once — store it client-side until completion if the
        customer hands the URL to a third party.
      operationId: startAwsAccount
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudAccountStartRequest"
      responses:
        "200":
          description: Pending cloud account + onboarding URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAccountStartResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/aws/accounts/{id}:
    get:
      summary: Get a single AWS cloud account
      operationId: getAwsAccount
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/CloudAccountID"
      responses:
        "200":
          description: Cloud account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAccount"
        default:
          $ref: "#/components/responses/Error"
    delete:
      summary: Disconnect an AWS cloud account
      description: |
        Drops Spacefleet's record. The CloudFormation stack in the
        customer's account is left in place — they own teardown.
      operationId: deleteAwsAccount
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/CloudAccountID"
      responses:
        "204":
          description: Disconnected (idempotent)
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/aws/accounts/{id}/complete:
    post:
      summary: Finalize AWS onboarding by submitting the role ARN
      description: |
        Customer (or whoever launched the stack) provides the role ARN
        from the stack's Outputs.RoleArn. The server runs an STS probe
        against (role_arn, external_id) and flips status to connected on
        success or error on failure.
      operationId: completeAwsAccount
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/CloudAccountID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudAccountCompleteRequest"
      responses:
        "200":
          description: Onboarding completed (verification ran)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAccount"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/aws/accounts/{id}/verify:
    post:
      summary: Re-run the verification probe against a cloud account
      operationId: verifyAwsAccount
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/CloudAccountID"
      responses:
        "200":
          description: Verification ran (status reflects the result)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudAccount"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/apps:
    get:
      summary: List apps registered for this org
      operationId: listApps
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      responses:
        "200":
          description: Apps (newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppList"
        default:
          $ref: "#/components/responses/Error"
    post:
      summary: Register an app for builds in this org
      description: |
        Validates the cloud account is connected, the GitHub installation
        belongs to the org, and the requested repo is reachable from
        that installation. The repo's default branch is captured from
        GitHub at create time and used as the default ref for builds.
      operationId: createApp
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppCreateRequest"
      responses:
        "201":
          description: App created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/apps/{appSlug}:
    get:
      summary: Get a single app by slug
      operationId: getApp
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/AppSlug"
      responses:
        "200":
          description: App
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        default:
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an app, optionally tearing down its AWS resources
      description: |
        With `destroy_resources: false` the app row is dropped immediately
        and the customer's AWS resources (ECR repo, IAM role, log group)
        remain in place. With `destroy_resources: true` the row is
        marked for teardown and a destroy_app job is queued; the row
        disappears once `pulumi destroy` succeeds. Either way, returns
        409 if any builds are running for the app.
      operationId: deleteApp
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/AppSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppDeleteRequest"
      responses:
        "200":
          description: App deleted in place (no resources destroyed)
        "202":
          description: Destroy job enqueued; row will be removed after teardown completes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/App"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/apps/{appSlug}/builds:
    get:
      summary: List builds for an app, newest first
      operationId: listBuilds
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/AppSlug"
      responses:
        "200":
          description: Builds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildList"
        default:
          $ref: "#/components/responses/Error"
    post:
      summary: Start a new build for an app
      description: |
        Resolves the requested ref (defaults to the app's default branch)
        to a 40-char commit SHA, mints a per-build webhook secret, and
        enqueues a River BuildJob. The 202 response carries the build's
        UUID so the UI can poll for status.
      operationId: createBuild
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/AppSlug"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildCreateRequest"
      responses:
        "202":
          description: Build enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/apps/{appSlug}/builds/{buildId}:
    get:
      summary: Get one build by UUID, scoped to the app and org
      operationId: getBuild
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/AppSlug"
        - $ref: "#/components/parameters/BuildID"
      responses:
        "200":
          description: Build
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        default:
          $ref: "#/components/responses/Error"

  /api/orgs/{slug}/apps/{appSlug}/builds/{buildId}/logs:
    get:
      summary: Fetch one page of CloudWatch log events for a build
      description: |
        Polls CloudWatch Logs in the customer's account for the build's
        log stream. The first call returns the oldest events. Subsequent
        calls pass `after` (the previous response's `next_token`) to get
        the next page; CloudWatch returns the same `next_token` once the
        stream is fully drained, which is when `has_more` will be false.

        Returns an empty page (no events, empty `next_token`) before the
        build has dispatched or before the builder has written its first
        log line. Callers poll while `build_terminal` is false; once it
        flips true and `has_more` is false, no further events will appear.
      operationId: getBuildLogs
      parameters:
        - $ref: "#/components/parameters/OrgSlug"
        - $ref: "#/components/parameters/AppSlug"
        - $ref: "#/components/parameters/BuildID"
        - in: query
          name: after
          required: false
          schema:
            type: string
          description: Opaque continuation token from a previous response.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 1000
          description: Max events to return. Defaults to 1000.
      responses:
        "200":
          description: One page of log events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildLogPage"
        default:
          $ref: "#/components/responses/Error"

  /api/cli/whoami:
    get:
      summary: Return the user associated with the CLI token
      description: |
        Smoke-test endpoint for the CLI — confirms a token is valid and
        reports whose identity it carries. Clerk-authenticated calls also
        work; they simply echo the Clerk session's user id.
      operationId: cliWhoami
      responses:
        "200":
          description: Identity echo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliWhoami"
        default:
          $ref: "#/components/responses/Error"

components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    Greeting:
      type: object
      required: [message]
      properties:
        message:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    CliApproveRequest:
      type: object
      required: [name, challenge]
      properties:
        name:
          type: string
          description: User-chosen label for the token (e.g. hostname).
        challenge:
          type: string
          description: Base64url(sha256(verifier)) — the CLI's PKCE challenge.

    CliApproveResponse:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Single-use exchange code, valid for ~5 minutes.

    CliExchangeRequest:
      type: object
      required: [code, verifier]
      properties:
        code:
          type: string
        verifier:
          type: string

    CliExchangeResponse:
      type: object
      required: [token, name, expires_at]
      properties:
        token:
          type: string
          description: The bearer token. Returned exactly once — not recoverable later.
        name:
          type: string
        expires_at:
          type: string
          format: date-time

    CliToken:
      type: object
      required: [id, name, created_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true

    CliTokenList:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/CliToken"

    CliWhoami:
      type: object
      required: [user_id, source]
      properties:
        user_id:
          type: string
        source:
          type: string
          enum: [clerk, cli]

    GithubInstallStart:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: |
            Send the user here to install the App. State is embedded in the
            URL; the caller does not need to track it.

    GithubInstallCompleteRequest:
      type: object
      required: [state, installation_id]
      properties:
        state:
          type: string
        installation_id:
          type: integer
          format: int64

    GithubInstallCompleteResponse:
      type: object
      required: [installation, org_slug]
      properties:
        installation:
          $ref: "#/components/schemas/GithubInstallation"
        org_slug:
          type: string
          description: The org the installation was bound to. Use it to redirect.

    GithubInstallation:
      type: object
      required:
        [
          id,
          installation_id,
          account_login,
          account_type,
          account_id,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        installation_id:
          type: integer
          format: int64
        account_login:
          type: string
        account_type:
          type: string
          description: '"User" or "Organization" (mirrors GitHub).'
        account_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        suspended_at:
          type: string
          format: date-time
          nullable: true

    GithubInstallationList:
      type: object
      required: [installations]
      properties:
        installations:
          type: array
          items:
            $ref: "#/components/schemas/GithubInstallation"

    GithubRepository:
      type: object
      required: [id, name, full_name, private, default_branch, html_url]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        full_name:
          type: string
        private:
          type: boolean
        default_branch:
          type: string
        html_url:
          type: string
          format: uri

    GithubRepositoryList:
      type: object
      required: [repositories]
      properties:
        repositories:
          type: array
          items:
            $ref: "#/components/schemas/GithubRepository"

    CloudAccount:
      type: object
      required:
        [
          id,
          provider,
          label,
          status,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          description: Cloud provider — only "aws" today.
        label:
          type: string
        account_id:
          type: string
          nullable: true
          description: 12-digit AWS account ID (empty until onboarding completes).
        role_arn:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        status:
          type: string
          description: pending | connected | error | disabled.
        last_verified_at:
          type: string
          format: date-time
          nullable: true
        last_verification_error:
          type: string
          nullable: true
        update_stack_url:
          type: string
          format: uri
          nullable: true
          description: |
            Deep-link to the AWS Console Update Stack wizard with the
            current onboarding template URL pre-filled. Lets a customer
            re-apply the latest permissions policy without re-onboarding.
            Null if the server has no template URL configured.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CloudAccountList:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/CloudAccount"

    CloudAccountStartRequest:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: Human-friendly name like "acme-prod". Unique per org.
        region:
          type: string
          description: Optional default region for the Quick Create link.

    CloudAccountStartResponse:
      type: object
      required: [account, external_id, quick_create_url, platform_account_id]
      properties:
        account:
          $ref: "#/components/schemas/CloudAccount"
        external_id:
          type: string
          description: |
            Returned exactly once. Treat as a secret. Embedded in the
            CloudFormation trust policy and presented on every AssumeRole.
        quick_create_url:
          type: string
          format: uri
          description: |
            CloudFormation Quick Create URL with the platform account ID
            and external ID pre-filled. Send the customer here.
        platform_account_id:
          type: string
          description: |
            The AWS account ID Spacefleet is running in — what the
            customer's IAM trust policy will allow AssumeRole from.

    App:
      type: object
      required:
        [
          id,
          org_slug,
          name,
          slug,
          cloud_account_id,
          github_installation_id,
          github_repo_full_name,
          default_branch,
          created_by,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        org_slug:
          type: string
        name:
          type: string
        slug:
          type: string
          description: URL-safe identifier, immutable for the app's lifetime.
        cloud_account_id:
          type: string
          format: uuid
        github_installation_id:
          type: string
          format: uuid
        github_repo_full_name:
          type: string
          description: '"owner/repo" — captured at create time.'
        default_branch:
          type: string
          description: Default ref to build when a build request omits one. Captured from GitHub at create time and not auto-refreshed.
        created_by:
          type: string
          description: Clerk user ID of the person who registered the app.
        deleting_at:
          type: string
          format: date-time
          nullable: true
          description: Set when destroy_resources is in flight; null otherwise.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AppList:
      type: object
      required: [apps]
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/App"

    AppCreateRequest:
      type: object
      required:
        [
          name,
          cloud_account_id,
          github_installation_id,
          github_repo_full_name,
        ]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        cloud_account_id:
          type: string
          format: uuid
        github_installation_id:
          type: string
          format: uuid
          description: Spacefleet's row UUID, not GitHub's int64 installation_id.
        github_repo_full_name:
          type: string
          description: '"owner/repo".'

    Build:
      type: object
      required: [id, app_id, source_ref, source_sha, status, stages, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
        app_id:
          type: string
          format: uuid
        source_ref:
          type: string
          description: What the user typed — branch, tag, or SHA.
        source_sha:
          type: string
          description: Resolved 40-char commit SHA.
        status:
          type: string
          enum: [queued, running, succeeded, failed]
        stages:
          type: array
          items:
            $ref: "#/components/schemas/BuildStage"
        image_uri:
          type: string
          description: Populated on success.
        image_digest:
          type: string
          description: Populated on success (sha256:...).
        fargate_task_arn:
          type: string
        log_group:
          type: string
        log_stream:
          type: string
        error_message:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true

    BuildStage:
      type: object
      required: [name, status, at]
      properties:
        name:
          type: string
          description: Stage name (reconcile, prepare, dispatch, clone, build, push, backstop).
        status:
          type: string
          enum: [running, succeeded, failed]
        at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
          description: Per-stage payload (image_uri/image_digest on push, error on failed).

    BuildList:
      type: object
      required: [builds]
      properties:
        builds:
          type: array
          items:
            $ref: "#/components/schemas/Build"

    BuildLogEvent:
      type: object
      required: [timestamp, message]
      properties:
        timestamp:
          type: integer
          format: int64
          description: Producer-side unix timestamp in milliseconds.
        message:
          type: string

    BuildLogPage:
      type: object
      required: [events, has_more, build_terminal]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/BuildLogEvent"
        next_token:
          type: string
          description: |
            Opaque continuation token. Pass back as `after` on the next
            call. Empty when the build hasn't dispatched yet.
        has_more:
          type: boolean
          description: |
            True when the server believes more events are available. False
            once the stream is fully drained; combined with
            `build_terminal=true`, this signals the UI can stop polling.
        build_terminal:
          type: boolean
          description: |
            True when the build's status is succeeded or failed. The UI
            stops polling once this is true and `has_more` is false.

    BuildCreateRequest:
      type: object
      properties:
        ref:
          type: string
          description: Branch, tag, or SHA. Defaults to the app's default_branch when omitted.

    AppDeleteRequest:
      type: object
      properties:
        destroy_resources:
          type: boolean
          default: false
          description: |
            When true, queue a destroy_app job that runs `pulumi destroy`
            on the per-app stack. When false (default), drop our row only
            and leave the customer's AWS resources in place.

    CloudAccountCompleteRequest:
      type: object
      required: [role_arn]
      properties:
        role_arn:
          type: string
          description: From the stack's Outputs.RoleArn.

  parameters:
    OrgSlug:
      in: path
      name: slug
      required: true
      schema:
        type: string
    InstallationID:
      in: path
      name: installationId
      required: true
      schema:
        type: integer
        format: int64
    CloudAccountID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    AppSlug:
      in: path
      name: appSlug
      required: true
      schema:
        type: string
    BuildID:
      in: path
      name: buildId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
