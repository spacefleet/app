root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/spacefleet ./cmd/spacefleet"
  bin = "./tmp/spacefleet"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["bin", "tmp", "node_modules", "ui/node_modules", "ui/dist", "ui/src"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
